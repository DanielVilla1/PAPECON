# ── PAPECON Docker Compose ─────────────────────────────
# Usage:
#   docker compose up --build        (build & start all services)
#   docker compose up -d             (detached / background)
#   docker compose down              (stop & remove containers)
#   docker compose logs -f backend   (follow backend logs)

services:
  # ── PostgreSQL Database ──────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: papecon
      POSTGRES_PASSWORD: papecon_secret
      POSTGRES_DB: papecon
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U papecon" ]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── FastAPI Backend ──────────────────────────────────
  backend:
    build: ./backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://papecon:papecon_secret@db:5432/papecon
      SECRET_KEY: ${SECRET_KEY:-papecon-docker-secret-change-in-production}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost}
      CORS_ORIGINS: ${CORS_ORIGINS:-}
      SMTP_HOST: ${SMTP_HOST:-smtp.gmail.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-}
    command: [ "uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8000", "--reload" ]
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"

  # ── React Frontend (nginx) ──────────────────────────
  frontend:
    build:
      context: .
      args:
        VITE_API_URL: /api
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"

volumes:
  pgdata:
